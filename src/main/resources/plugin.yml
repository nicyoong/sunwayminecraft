name: SunwayMinecraft
version: '1.0-SNAPSHOT'
main: com.sunwayMinecraft.SunwayMinecraft
api-version: '1.20'
softdepend: [Vault]

commands:
  pausebeacons:
    description: "Pause the beacon color transitions."
    usage: "/pausebeacons"
    permission: "sunwayminecraft.beacons.pause"

  resumebeacons:
    description: "Resume the beacon color transitions."
    usage: "/resumebeacons"
    permission: "sunwayminecraft.beacons.resume"

  reloadsunwayconfig:
    description: "Reloads the SunwayMinecraft plugin configuration."
    usage: "/reloadsunwayconfig"
    permission: "sunwayminecraft.config.reload"

  setbeaconticks:
    description: "Set the number of ticks per beacon color transition."
    usage: "/setbeaconticks <ticks>"
    permission: "sunwayminecraft.beacons.setticks"

  reloadsunwaybenches:
    description: "Reload bench configurations"
    usage: "/reloadsunwaybenches"
    permission: "sunwayminecraft.benches.reload"

  listbenches:
    description: "List all bench regions"
    usage: "/listbenches"
    permission: "sunwayminecraft.benches.list"

  benchinfo:
    description: "Show bench region details"
    usage: "/benchinfo <name>"
    permission: "sunwayminecraft.benches.info"

  checkbenchregion:
    description: "Check current bench region"
    usage: "/checkbenchregion"
    permission: "sunwayminecraft.benches.check"

  findpets:
    description: "Find your tamed pets in loaded chunks"
    usage: "/findpets [player]"
    permission: "sunwayminecraft.petfinder.use"

  findpetsinarea:
    description: "Search for pets in a specific area"
    usage: "/findpetsinarea <x1> <y1> <z1> <x2> <y2> <z2> [player]"
    permission: "sunwayminecraft.petfinder.admin"

  scanlights:
    description: "Scan for light blocks in current region"
    usage: "/scanlights"
    permission: "sunwayminecraft.switches.scanlights"

  exportlights:
    description: "Export light positions to file"
    usage: "/exportlights <filename>"
    permission: "sunwayminecraft.switches.exportlights"

  listlightregions:
    description: "List all defined light regions"
    usage: "/listlightregions"
    permission: "sunwayminecraft.switches.listregions"

  checklightregion:
    description: "Check if you're in a light region"
    usage: "/checklightregion"
    permission: "sunwayminecraft.switches.checkregion"

  lightinfo:
    description: "Show information about targeted light block"
    usage: "/lightinfo"
    permission: "sunwayminecraft.switches.info"

  reloadsunwayswitches:
    description: "Reload switch configurations"
    usage: "/reloadsunwayswitches"
    permission: "sunwayminecraft.switches.reload"

  servertime:
    description: "Displays the server's real-world time and date"
    usage: "/servertime"

  servertimeutc:
    description: "Shows server time in UTC"
    usage: "/servertimeutc"

  cf:
    description: "Coin flip game command"
    usage: "/cf <amount> <heads|tails> OR /cf item <amount> <heads|tails> OR /cf [mute|unmute|help]"

permissions:
  sunwayminecraft.beacons.pause:
    description: "Allows the user to pause beacon color transitions."
    default: op

  sunwayminecraft.beacons.resume:
    description: "Allows the user to resume beacon color transitions."
    default: op

  sunwayminecraft.config.reload:
    description: "Allows the user to reload the SunwayMinecraft plugin configuration."
    default: op

  sunwayminecraft.beacons.setticks:
    description: "Allows setting the number of ticks per beacon color transition."
    default: op

  sunwayminecraft.benches.reload:
    description: "Allows reloading bench configurations"
    default: op

  sunwayminecraft.benches.list:
    description: "List bench regions"
    default: op

  sunwayminecraft.benches.info:
    description: "View bench details"
    default: op

  sunwayminecraft.benches.check:
    description: "Check current bench region"
    default: true

  sunwayminecraft.petfinder.use:
    description: "Allows using basic pet finding"
    default: true

  sunwayminecraft.petfinder.admin:
    description: "Allows advanced pet finding features"
    default: op

  sunwayminecraft.switches.scanlights:
    description: "Allows scanning for light blocks"
    default: op

  sunwayminecraft.switches.exportlights:
    description: "Allows exporting light positions to files"
    default: op

  sunwayminecraft.switches.listregions:
    description: "Allows listing light regions"
    default: op

  sunwayminecraft.switches.checkregion:
    description: "Allows checking light region membership"
    default: op

  sunwayminecraft.switches.info:
    description: "Allows viewing light block information"
    default: op
  
  sunwayminecraft.switches.reload:
    description: "Allows reloading switch configurations"
    default: op

  sunwayminecraft.switches.admin:
    description: "Full access to all switch commands"
    default: op
    children:
      sunwayminecraft.switches.*: true